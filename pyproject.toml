[project]
name = "careeros"
version = "0.1.0"
description = "A supreme, high-quality job discovery and recommendation engine. Deterministic where possible, AI only where reasoning adds value."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "typer>=0.12",
    "pyyaml>=6.0",
    "jsonschema>=4.20",
    "apify-client>=3.0,<4",
    "gspread>=6.0",
    "google-auth>=2.28",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.scripts]
careeros = "careeros.cli:app"

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["careeros*"]
