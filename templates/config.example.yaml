# Example config — copied to .careeros/config.yaml by `careeros init`.
# Every key here has a built-in default (see careeros/config.py); only
# override what you need to change.

# "fantastic-jobs" (REST, default, maintained — see the `api:` block below)
# or "fantastic-jobs-actor" (legacy Apify actor — see the `apify:` block;
# kept as a reference/no-code backend, not the actively maintained path).
provider: fantastic-jobs
threshold: 4.0          # APPLY: score >= this -> full pipeline (resume/cover/report + Drive + Sheet)
consider_threshold: 3.5 # CONSIDER: this <= score < threshold -> Sheet row only (score + reason, no AI artifacts). Below this = omitted
gate_batch_size: 50      # jobs per AI Gate call — the main cost lever
description_max_chars: 4000

# Your job-search target. Used only as CONTEXT in the discovery quota-guard's
# recommendation (see the api: block below) — it never changes scoring.
goals:
  interviews_per_week: null   # e.g. 5 — leave null until you have a target

# Only stages actually read via config (gate, eval, resume, cover). deep_report
# and apply are invoked by skills/prep.md and skills/apply.md, which read
# their prompt files directly by a hardcoded path, not through this config.
prompts:
  gate: v1
  eval: v2
  resume: v1
  cover: v1

sheets:
  spreadsheet_id: null          # your Google Sheet's id (from its URL)
  credentials_path: null        # path to a Google service-account JSON key
  worksheet: "Jobs"

# Config for the DEFAULT `fantastic-jobs` provider (the official Fantastic
# Jobs REST API). Only read when provider: fantastic-jobs (above).
api:
  # REQUIRED — no default. "direct" (developer.fantastic.jobs) or "rapidapi"
  # (RapidAPI's "Active Jobs DB"). Both return the identical dataset; pick
  # whichever has the better price/free-tier for your volume — see the
  # P2.6/P2.7 architecture review. `careeros discover` fails fast with a
  # clear message if this is left unset.
  transport: null
  # transport: direct
  base_url: "https://data.fantastic.jobs"
  api_key_env: FANTASTIC_API_KEY   # set this env var to your developer.fantastic.jobs key
  # transport: rapidapi — verify the exact host against your own RapidAPI
  # dashboard for the "Active Jobs DB" listing before relying on this default.
  rapidapi_host: active-jobs-db.p.rapidapi.com
  rapidapi_key_env: RAPIDAPI_KEY   # set this env var to your RapidAPI key
  endpoint: both                   # both (DEFAULT, frozen) | active-ats (career sites) | active-jb (+LinkedIn/YC/Wellfound)
  # "both" queries active-ats AND active-jb every run — the P2.8 acceptance
  # audit (full 107-job population) found the two sources score a statistically
  # identical ~8% >=4.0 rate but are 92% disjoint, so "both" roughly doubles
  # interview-worthy jobs found at the SAME quota: the per-tier record
  # allocation is SPLIT 50/50 across the two endpoints (it is NOT doubled).
  endpoint_allocation: null        # null = equal 50/50; override on a paid plan, e.g. {active-ats: 0.3, active-jb: 0.7}
  discovery_mode: profile
  time_range: "7d"                 # 1h | 24h | 7d | 6m
  title_search: ["Product Manager"]
  location_search: []
  title_exclusion_search: []
  location_exclusion_search: []
  work_arrangement: []             # any of: "On-site" | "Hybrid" | "Remote OK" | "Remote Solely"
  remove_agency: true
  has_salary: null
  tier_limits: {}
  # ── Quota guard (advisory). CareerOS recommends a daily limit and warns
  # before you exhaust your weekly record quota, but never changes these. ──
  plan: null                       # free | rapidapi | paid | enterprise  (free -> 500 records/week)
  weekly_record_quota: null        # set for a paid plan so the guard knows your ceiling
  active_days_per_week: 7          # how the weekly quota is spread when recommending a daily limit
  limit: null                      # your per-query record cap; null -> 100. Guard warns if it blows the quota

# LEGACY — only read when provider: fantastic-jobs-actor. Kept for no-code/
# Zapier/n8n/MCP-style setups; not the actively maintained discovery path
# (see providers/legacy/fantastic_jobs_actor.py).
apify:
  token_env: APIFY_TOKEN        # single-token env var (back-compat)
  tokens_env: APIFY_TOKENS      # comma-separated token pool — set this for
                                 # automatic rotation when one token's monthly
                                 # budget is exhausted (checked first, falls
                                 # back to token_env if unset)
  actor: "fantastic-jobs/career-site-job-listing-api"
  time_range: "7d"                    # actor timeRange: 1h | 24h | 7d | 6m
  # "profile" (default): `discover` runs one segmented query per
  # profile.yaml's work_mode_priority tier (see careeros/pipeline/queryplan.py)
  # — a single broad query was found to yield far fewer apply-worthy jobs than
  # targeted per-work-mode ones. "single" restores the classic one-query
  # behavior driven by title_search/location_search below (also the automatic
  # fallback if your profile has no work_mode_priority/role_priorities yet).
  discovery_mode: profile
  title_search: ["Product Manager"]   # only used in discovery_mode: single
  location_search: []                 # only used in discovery_mode: single
  title_exclusion_search: []          # actor titleExclusionSearch (array)
  location_exclusion_search: []       # actor locationExclusionSearch (array)
  # Source-side filtering (fetch fewer, more-targeted jobs instead of
  # fetching broadly and discarding most of it in `constraints` — the
  # highest-ROI discovery lever found in the 2026-07-08 benchmark).
  work_arrangement: []           # any of: "On-site" | "Hybrid" | "Remote OK" | "Remote Solely"
  remove_agency: true            # drop recruiting-agency postings server-side
  has_salary: null               # true/false to filter on salary presence; null = don't filter
  # Per-call spend cap (USD) — this is a pay-per-result actor on a metered
  # free-tier budget; QA hit a raw crash after exhausting it unbounded.
  max_cost_usd: 1.0
  # Optional per-work-mode-tier limit override (keys = your own
  # profile.work_mode_priority tier names). Any tier not listed here uses
  # `discover --limit`. Deliberately ships EMPTY — which tiers are worth a
  # bigger fetch is specific to your own profile and conversion history
  # (check run.json's cost-per-selected-job over a few days), not something
  # CareerOS should assume for you. Example shape, commented out:
  # tier_limits:
  #   global_remote: 15
  #   india_remote: 25
  tier_limits: {}

# Approximate FX to your profile's comp currency, used only by the
# deterministic salary hard-constraint (careeros/pipeline/constraints.py).
# Unknown/missing salary never rejects — only a confidently-computed,
# below-floor amount does.
fx_rates:
  INR: 1.0
  USD: 83.0
  EUR: 90.0
  GBP: 105.0

# Optional Google Drive backup of the day's shortlisted artifacts (P2.6).
# ADDITIVE only — your local .careeros/runs/ Markdown stays the source of
# truth; Drive is never read back by any pipeline stage. Off by default so a
# fresh clone works with zero Drive setup. Needs `pip install -e ".[drive]"`.
drive:
  enabled: false
  # An OAuth 2.0 "Desktop app" client secret JSON from Google Cloud Console
  # (Credentials -> Create Credentials -> OAuth client ID -> Desktop app).
  # NOT a service-account key — uploads use YOUR OWN Drive quota via a
  # one-time browser consent, not a service account (which can't write into
  # a personal Drive the way your own OAuth grant can).
  client_secret_path: null
  # Where the refresh token is cached after the first consent — reused
  # silently on every later run, no browser needed again.
  token_path: ".careeros/drive_token.json"
  # Flat layout: every Apply-tier job's files (Resume.pdf, Cover Letter.pdf,
  # Evaluation.md, Deep Report.md if it exists) land directly in this ONE
  # folder as "Company - Role - <Artifact>.<ext>" — no per-company, no
  # per-job subfolders. Point this at a folder you already created/shared
  # (its id is the last segment of its drive.google.com/drive/folders/<id>
  # URL). Needs pip install -e ".[drive,pdf]" — see docs/google-setup.md.
  root_folder_id: null
  # Optional: group each day's uploads under a YYYY-MM-DD subfolder inside
  # root_folder_id instead of the flat root. Off by default.
  date_subfolder: false
